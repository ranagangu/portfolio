<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f121d" />
      <stop offset="100%" stop-color="#080a10" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#4facfe" stop-opacity="0.8" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#grad1)" />
  
  <!-- Dashboard Grid -->
  <rect x="50" y="50" width="700" height="400" rx="15" fill="#141929" stroke="rgba(255,255,255,0.05)" stroke-width="2" />
  
  <!-- Top Bar -->
  <rect x="50" y="50" width="700" height="50" rx="15" fill="#1a2035" />
  <circle cx="80" cy="75" r="6" fill="#ff5f56" />
  <circle cx="100" cy="75" r="6" fill="#ffbd2e" />
  <circle cx="120" cy="75" r="6" fill="#27c93f" />
  
  <!-- Sidebar -->
  <rect x="50" y="100" width="180" height="350" fill="#171d30" opacity="0.5" />
  <rect x="70" y="130" width="140" height="20" rx="5" fill="rgba(255,255,255,0.05)" />
  <rect x="70" y="170" width="140" height="20" rx="5" fill="rgba(255,255,255,0.05)" />
  <rect x="70" y="210" width="140" height="20" rx="5" fill="url(#glow)" />
  <rect x="70" y="250" width="140" height="20" rx="5" fill="rgba(255,255,255,0.05)" />
  
  <!-- Main Grid Widgets -->
  <!-- Chart Widget -->
  <rect x="250" y="120" width="470" height="180" rx="10" fill="#1a2035" stroke="rgba(255,255,255,0.03)" />
  <text x="270" y="150" fill="#94a3b8" font-family="'Space Grotesk', sans-serif" font-size="14" font-weight="bold">AI Customer Insights &amp; Analytics</text>
  
  <!-- Graph Lines -->
  <path d="M 280 260 L 350 200 L 420 230 L 490 170 L 560 210 L 630 150 L 700 180" fill="none" stroke="url(#glow)" stroke-width="4" stroke-linecap="round" />
  <path d="M 280 260 L 350 200 L 420 230 L 490 170 L 560 210 L 630 150 L 700 180 L 700 270 L 280 270 Z" fill="url(#glow)" opacity="0.05" />
  
  <!-- Small Cards -->
  <rect x="250" y="320" width="140" height="110" rx="10" fill="#1a2035" />
  <text x="270" y="350" fill="#94a3b8" font-family="'Space Grotesk', sans-serif" font-size="12">Total Leads</text>
  <text x="270" y="390" fill="#00f2fe" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="bold">1,248</text>
  
  <rect x="415" y="320" width="140" height="110" rx="10" fill="#1a2035" />
  <text x="435" y="350" fill="#94a3b8" font-family="'Space Grotesk', sans-serif" font-size="12">AI Predictions</text>
  <text x="435" y="390" fill="#8a2be2" font-family="'Space Grotesk', sans-serif" font-size="28" font-weight="bold">89%</text>

  <rect x="580" y="320" width="140" height="110" rx="10" fill="#1a2035" />
  <text x="600" y="350" fill="#94a3b8" font-family="'Space Grotesk', sans-serif" font-size="12">Active Sync</text>
  <circle cx="610" cy="385" r="8" fill="#27c93f" />
  <text x="625" y="390" fill="#f8fafc" font-family="'Space Grotesk', sans-serif" font-size="14">Online</text>
